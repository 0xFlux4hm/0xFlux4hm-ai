# ─────────────────────────────────────────────────────────────────────────────
# 0xFlux4hm AI — VulnAgentRouter Configuration
# ─────────────────────────────────────────────────────────────────────────────

# Router AI settings
router:
  model: "claude-sonnet-4-20250514"
  max_tokens: 2048
  temperature: 0.2                  # Low temperature for consistent routing decisions
  session_persist: true             # Persist session context to avoid repeated API calls
  keyword_fallback: true            # Use keyword matching before Claude API call (saves cost)

# Safety & Ethics — the "Ethical Loop"
safety:
  require_confirmation: true        # Prompt user before aggressive scans
  max_requests_per_scan: 100        # Hard cap on outbound requests per scan session
  log_all_commands: true            # Log every command to SQLite for accountability
  scope_enforcement: true           # Warn if target appears to be out of scope
  disclaimer_on_every_output: true  # Append ethical disclaimer to all agent outputs

# Agent-specific configuration
agents:

  recon:
    enabled: true
    timeout_seconds: 60
    use_subfinder: true             # Requires: subfinder (apt/pkg install subfinder)
    use_amass: false                # Requires: amass (heavy, optional)
    use_dnspython: true             # Pure Python DNS lookups (always available)
    max_subdomains: 100
    save_report: true

  web:
    enabled: true
    timeout_seconds: 120
    use_nmap: true                  # Requires: nmap (apt/pkg install nmap)
    use_nikto: false                # Requires: nikto (apt install nikto)
    use_wapiti: false               # Requires: wapiti3 (pip install wapiti3)
    sqli_test_enabled: true         # Basic SQLi probe (NOT auto-exploit)
    auto_exploit: false             # NEVER auto-exploit — always require confirmation
    request_delay_ms: 500           # Delay between web requests (rate limiting)

  exploit:
    enabled: true
    timeout_seconds: 30
    use_searchsploit: true          # Requires: exploitdb (apt install exploitdb)
    use_api_fallback: true          # Query Exploit-DB public API if searchsploit unavailable
    include_patch_references: true  # Always include patch/mitigation info in output
    max_results: 10

  report:
    enabled: true
    output_format: "markdown"       # Options: markdown, html, both
    output_dir: "logs/reports"
    include_executive_summary: true
    include_risk_ratings: true      # Low / Medium / High / Critical
    include_recommendations: true
    include_disclaimer: true

# Logging
logging:
  db_path: "logs/scans.db"
  log_level: "INFO"                 # DEBUG | INFO | WARNING | ERROR
  log_to_console: true
  log_to_file: true
  log_file: "logs/router.log"
  max_log_size_mb: 50
  backup_count: 5

# Tool paths (override auto-detection if needed)
tools:
  nmap: "nmap"
  subfinder: "subfinder"
  searchsploit: "searchsploit"
  nikto: "nikto"
  sqlmap: "sqlmap"
